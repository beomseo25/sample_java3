name: Sample Java 1 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # 🌟 핵심: 라이브러리를 캐싱해서 빌드 속도를 비약적으로 높여줍니다.

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Test and Build
      # clean을 통해 찌꺼기를 날리고, build 명령어로 테스트와 포장을 한 번에 끝냅니다.
      run: ./gradlew clean build

    - name: Upload artifact (빌드 결과물 저장)
      uses: actions/upload-artifact@v4
      with:
        name: sample-java1-build
        path: build/libs/*SNAPSHOT.jar
        retention-days: 1
